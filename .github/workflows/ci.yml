name: Mediaxa Business Suite CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Android Client Job
  android-build:
    name: Android Client Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Android Unit Tests
        run: ./gradlew test --no-daemon

      - name: Build Android Debug Assembly
        run: ./gradlew assembleDebug --no-daemon

  # 2. Node.js Sync Backend Job
  backend-build:
    name: Node.js Backend Verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mediaxa-sync-backend
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: mediaxa-sync-backend/package-lock.json

      - name: Install Node Dependencies
        run: npm ci

      - name: Verify Code Style (Lint)
        run: npm run lint

      - name: Generate Prisma ORM Client
        run: npm run build

      - name: Run Integration Tests
        run: npm run test

  # 3. Next.js Web Dashboard Job
  web-build:
    name: Web Dashboard Verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mediaxa-web
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: mediaxa-web/package-lock.json

      - name: Install Web Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Verify Web Code Style (Lint)
        run: npm run lint

      - name: Build Next.js Static Application
        run: npm run build
